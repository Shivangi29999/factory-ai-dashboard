services:
  # Backend API Service
  - name: factory-ai-backend
    type: web
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./factory.db
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      name: sqlite-data
      mountPath: /app
      sizeGB: 1

  # Frontend Static Site
  - name: factory-ai-frontend
    type: static
    region: oregon
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://factory-ai-backend.onrender.com
      - key: NODE_VERSION
        value: "20"
